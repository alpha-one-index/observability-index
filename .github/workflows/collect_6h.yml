name: ObservabilityIndex Collection (6h)
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python -m pipelines.collect

      - name: Commit & push exports
        run: |
          git config user.name "ObservabilityIndex Bot"
          git config user.email "bot@observabilityindex.com"
          git add exports/
          git diff --cached --quiet || git commit -m "data: collection update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
